# Deploy Game Brain backend to EC2 (Pulumi). Builds Docker image, pushes to ECR, runs pulumi up.
# Requires: PULUMI_ACCESS_TOKEN secret. For AWS: either OIDC (set AWS_ROLE_TO_ASSUME) or AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY.

name: Deploy Backend

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: game-brain-backend
  PULUMI_STACK: game-brain

jobs:
  deploy:
    name: Build, Push ECR, Pulumi Up
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS account ID
        id: aws-account
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT" >> $GITHUB_OUTPUT
          echo "ecr_uri=$ACCOUNT.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image (multi-arch)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ steps.aws-account.outputs.ecr_uri }}
          platforms: linux/amd64,linux/arm64

      - name: Install deployment dependencies
        run: pnpm install --frozen-lockfile --filter game-brain-deployment...
        working-directory: backend/deployment

      - name: Build lambda artifacts
        run: pnpm run build:lambdas
        working-directory: backend/deployment

      - name: Pulumi up
        uses: pulumi/actions@v6
        with:
          command: up
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: backend/deployment
          refresh: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Force ECS deployment (run latest image)
        run: |
          pnpm exec pulumi stack select ${{ env.PULUMI_STACK }}
          CLUSTER=$(pnpm exec pulumi stack output ecsClusterName)
          SERVICE=$(pnpm exec pulumi stack output ecsServiceName)
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --force-new-deployment --region ${{ env.AWS_REGION }}
        working-directory: backend/deployment
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: schema publish
        run: |
          curl -sSL https://graphql-hive.com/install.sh | sh
          hive schema:publish "shared/schema.graphql" \
            --registry.accessToken "${{ secrets.GRAPHQL_HIVE_ACCESS_TOKEN }}" \
            --target "game-brain/game-brain/production" \
            --github
