# Deploy Game Brain backend to EC2 (Pulumi). Builds Docker image, pushes to ECR, runs pulumi up.
# Requires: PULUMI_ACCESS_TOKEN secret. For AWS: either OIDC (set AWS_ROLE_TO_ASSUME) or AWS_ACCESS_KEY_ID + AWS_SECRET_ACCESS_KEY.

name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'backend/deployment/**'

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: game-brain-backend
  PULUMI_STACK: game-brain

jobs:
  deploy:
    name: Build, Push ECR, Pulumi Up
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS account ID
        id: aws-account
        run: |
          ACCOUNT=$(aws sts get-caller-identity --query Account --output text)
          echo "account_id=$ACCOUNT" >> $GITHUB_OUTPUT
          echo "ecr_uri=$ACCOUNT.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:latest" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          docker build -t ${{ steps.aws-account.outputs.ecr_uri }} ./backend
          docker push ${{ steps.aws-account.outputs.ecr_uri }}

      - name: Install deployment dependencies
        run: pnpm install --frozen-lockfile
        working-directory: backend/deployment

      - name: Build lambda artifacts
        run: pnpm run build:lambdas
        working-directory: backend/deployment

      - name: Pulumi up
        uses: pulumi/actions@v5
        with:
          command: up
          stack-name: ${{ env.PULUMI_STACK }}
          work-dir: backend/deployment
          refresh: true
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Force ECS deployment (run latest image)
        run: |
          cd backend/deployment
          pnpm exec pulumi stack select ${{ env.PULUMI_STACK }}
          CLUSTER=$(pnpm exec pulumi stack output ecsClusterName)
          SERVICE=$(pnpm exec pulumi stack output ecsServiceName)
          aws ecs update-service --cluster "$CLUSTER" --service "$SERVICE" --force-new-deployment --region ${{ env.AWS_REGION }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
