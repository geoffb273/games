name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.1.5). Leave empty to use the version from mobile/app.config.ts.'
        required: false
        type: string
      commit:
        description: 'Optional full commit SHA to release (e.g. 4a7bded7c5fc894e250ab0a9d74db3a449453121). Leave empty to use the HEAD of the branch selected below.'
        required: false
        type: string

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Validate release inputs
        env:
          COMMIT_INPUT: ${{ inputs.commit }}
        run: |
          set -euo pipefail
          if [ -n "$COMMIT_INPUT" ] && [[ ! "$COMMIT_INPUT" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "The commit input must be a full 40-character SHA." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.commit != '' && inputs.commit || github.ref }}

      # Write PAT into GITHUB_ENV so both GH_TOKEN and GITHUB_TOKEN match (gh may read either).
      - name: Configure GitHub CLI token
        env:
          RELEASE_PAT: ${{ secrets.RELEASE_GITHUB_TOKEN }}
          ACTIONS_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if [ -n "${RELEASE_PAT:-}" ]; then
            echo "GH_TOKEN=${RELEASE_PAT}" >> "${GITHUB_ENV}"
            echo "GITHUB_TOKEN=${RELEASE_PAT}" >> "${GITHUB_ENV}"
          else
            echo "GH_TOKEN=${ACTIONS_TOKEN}" >> "${GITHUB_ENV}"
            echo "GITHUB_TOKEN=${ACTIONS_TOKEN}" >> "${GITHUB_ENV}"
          fi

      - name: Resolve release target SHA
        id: release_target
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Resolve whether release needs explicit --target
        id: release_target_flag
        env:
          COMMIT_INPUT: ${{ inputs.commit }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          default_ref="refs/heads/${DEFAULT_BRANCH}"
          if [ -n "$COMMIT_INPUT" ] || [ "$WORKFLOW_REF" != "$default_ref" ]; then
            echo "use_target=1" >> "$GITHUB_OUTPUT"
          else
            echo "use_target=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          VERSION="${INPUT_VERSION:-}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -E "^[[:space:]]*version:" mobile/app.config.ts \
              | head -n1 \
              | sed -E "s/.*version:[[:space:]]*['\"]([^'\"]+)['\"].*/\1/")
          fi
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "Could not resolve a version from input or mobile/app.config.ts" >&2
            exit 1
          fi
          TAG="v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TAG" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION (tag: $TAG)"

      - name: Ensure tag does not already exist
        env:
          TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release $TAG already exists." >&2
            exit 1
          fi
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "Tag $TAG already exists in the repository." >&2
            exit 1
          fi

      - name: Find previous release tag
        id: previous
        run: |
          set -euo pipefail
          PREVIOUS_TAG=$(gh release list --repo "${GITHUB_REPOSITORY}" --limit 1 --json tagName --jq '.[0].tagName // ""')
          echo "previous_tag=$PREVIOUS_TAG" >> "$GITHUB_OUTPUT"
          if [ -n "$PREVIOUS_TAG" ]; then
            echo "Previous release tag: $PREVIOUS_TAG"
          else
            echo "No previous release found; generating notes from full history."
          fi

      - name: Create release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TITLE: ${{ steps.version.outputs.title }}
          PREVIOUS_TAG: ${{ steps.previous.outputs.previous_tag }}
          TARGET_SHA: ${{ steps.release_target.outputs.sha }}
          USE_TARGET: ${{ steps.release_target_flag.outputs.use_target }}
        run: |
          set -euo pipefail
          ARGS=(release create "$TAG"
            --repo "${GITHUB_REPOSITORY}"
            --title "$TITLE"
            --generate-notes)
          if [ "$USE_TARGET" = "1" ]; then
            ARGS+=(--target "$TARGET_SHA")
          fi
          if [ -n "$PREVIOUS_TAG" ]; then
            ARGS+=(--notes-start-tag "$PREVIOUS_TAG")
          fi
          gh "${ARGS[@]}"
