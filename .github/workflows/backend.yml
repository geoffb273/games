name: Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "shared/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"
      - "shared/**"

defaults:
  run:
    working-directory: backend

jobs:
  check:
    name: Lint, Typecheck & Schema
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc

      - name: Check schema is in sync
        run: pnpm check:schema
