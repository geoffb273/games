name: Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'shared/**'

defaults:
  run:
    working-directory: backend

jobs:
  lint_typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: games
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/games
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/games
      JWT_SECRET: test
      ADMIN_SECRET: test
      GRAPHQL_HIVE_ACCESS_TOKEN: test
      REDIS_USERNAME: ''
      REDIS_PASSWORD: ''
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Generate prisma client
        run: pnpm generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          ADMIN_SECRET: ${{ env.ADMIN_SECRET }}
          GRAPHQL_HIVE_ACCESS_TOKEN: ${{ env.GRAPHQL_HIVE_ACCESS_TOKEN }}
          REDIS_USERNAME: ${{ env.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ env.REDIS_PASSWORD }}
          REDIS_HOST: ${{ env.REDIS_HOST }}
          REDIS_PORT: ${{ env.REDIS_PORT }}

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: games
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/games
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/games
      JWT_SECRET: test
      ADMIN_SECRET: test
      GRAPHQL_HIVE_ACCESS_TOKEN: test
      REDIS_USERNAME: ''
      REDIS_PASSWORD: ''
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Generate prisma client
        run: pnpm generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          ADMIN_SECRET: ${{ env.ADMIN_SECRET }}
          GRAPHQL_HIVE_ACCESS_TOKEN: ${{ env.GRAPHQL_HIVE_ACCESS_TOKEN }}
          REDIS_USERNAME: ${{ env.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ env.REDIS_PASSWORD }}
          REDIS_HOST: ${{ env.REDIS_HOST }}
          REDIS_PORT: ${{ env.REDIS_PORT }}

      - name: Test
        run: pnpm test

  schema:
    name: Check Schema Sync
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: games
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/games
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/games
      JWT_SECRET: test
      ADMIN_SECRET: test
      GRAPHQL_HIVE_ACCESS_TOKEN: test
      REDIS_USERNAME: ''
      REDIS_PASSWORD: ''
      REDIS_HOST: localhost
      REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Generate prisma client
        run: pnpm generate
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DIRECT_URL: ${{ env.DIRECT_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          ADMIN_SECRET: ${{ env.ADMIN_SECRET }}
          GRAPHQL_HIVE_ACCESS_TOKEN: ${{ env.GRAPHQL_HIVE_ACCESS_TOKEN }}
          REDIS_USERNAME: ${{ env.REDIS_USERNAME }}
          REDIS_PASSWORD: ${{ env.REDIS_PASSWORD }}
          REDIS_HOST: ${{ env.REDIS_HOST }}
          REDIS_PORT: ${{ env.REDIS_PORT }}

      - name: Check schema is in sync
        run: pnpm check:schema
