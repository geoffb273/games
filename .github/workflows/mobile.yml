name: Mobile

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/**"
  pull_request:
    branches: [main]
    paths:
      - "mobile/**"
      - "shared/**"

defaults:
  run:
    working-directory: mobile

jobs:
  lint_typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mobile/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Generate GraphQL types
        run: pnpm generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm tsc

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: mobile/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Generate GraphQL types
        run: pnpm generate

      - name: Test
        run: pnpm test:ci
