type AlreadyExistsError implements Error {
  message: String
}

type AuthPayload {
  token: String!
}

type AuthenticatedUser {
  id: ID!
}

type DailyChallenge {
  completedPuzzleCount: Int!
  date: DateTime!
  id: ID!
  puzzleCount: Int!
}

scalar DateTime

interface Error {
  message: String
}

type HanjiPuzzle implements Puzzle {
  attempt: PuzzleAttempt
  colClues: [[Int!]!]!
  description: String
  height: Int!
  id: ID!
  name: String!
  rowClues: [[Int!]!]!
  width: Int!
}

input HashiBridgeInput {
  bridges: Int!
  from: HashiCoordinateInput!
  to: HashiCoordinateInput!
}

input HashiCoordinateInput {
  col: Int!
  row: Int!
}

type HashiIsland {
  col: Int!
  requiredBridges: Int!
  row: Int!
}

type HashiPuzzle implements Puzzle {
  attempt: PuzzleAttempt
  description: String
  height: Int!
  id: ID!
  islands: [HashiIsland!]!
  name: String!
  width: Int!
}

enum MinesweeperCellValue {
  EIGHT
  FIVE
  FOUR
  MINE
  ONE
  SEVEN
  SIX
  THREE
  TWO
  ZERO
}

type MinesweeperPuzzle implements Puzzle {
  attempt: PuzzleAttempt
  description: String
  height: Int!
  id: ID!
  mineCount: Int!
  mineField: [[MinesweeperCellValue!]!]!
  name: String!
  revealedCells: [MinesweeperRevealedCell!]!
  width: Int!
}

type MinesweeperRevealedCell {
  col: Int!
  row: Int!
  value: Int!
}

type Mutation {
  authenticateDevice(input: MutationAuthenticateDeviceInput!): AuthPayload!

  """
  Creates a daily challenge for the given date (admin only via x-admin-secret).
  """
  createDailyChallenge(input: MutationCreateDailyChallengeInput!): MutationCreateDailyChallengeResult!

  """Solves a puzzle for the logged in user"""
  solvePuzzle(input: MutationSolvePuzzleInput!): MutationSolvePuzzleResult!
}

input MutationAuthenticateDeviceInput {
  deviceId: String!
}

input MutationCreateDailyChallengeInput {
  """The date for the daily challenge (start of day)."""
  date: DateTime!
}

union MutationCreateDailyChallengeResult = AlreadyExistsError | MutationCreateDailyChallengeSuccess | UnauthorizedError

type MutationCreateDailyChallengeSuccess {
  data: DailyChallenge!
}

input MutationSolvePuzzleInput {
  """
  The time the user completed the puzzle, if they completed it successfully
  """
  completedAt: DateTime

  """
  The duration of the puzzle in milliseconds, if they completed it successfully
  """
  durationMs: Int

  """
  The solution to the Hanji puzzle. Should only be provided if the puzzle type is HANJI.
  """
  hanjiSolution: [[Int!]!]

  """
  The solution to the Hashi puzzle. Should only be provided if the puzzle type is HASHI.
  """
  hashiSolution: [HashiBridgeInput!]

  """
  The solution to the Minesweeper puzzle. Should only be provided if the puzzle type is MINESWEEPER.
  """
  minesweeperSolution: [[Boolean!]!]
  puzzleId: ID!
  puzzleType: PuzzleType!

  """The time the user started the puzzle"""
  startedAt: DateTime!
}

union MutationSolvePuzzleResult = AlreadyExistsError | MutationSolvePuzzleSuccess | NotFoundError | UnauthorizedError | UnknownError | ValidationError

type MutationSolvePuzzleSuccess {
  data: PuzzleAttempt!
}

type NotFoundError implements Error {
  message: String
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

interface Puzzle {
  attempt: PuzzleAttempt
  description: String
  id: ID!
  name: String!
}

type PuzzleAttempt {
  completedAt: DateTime
  durationMs: Int
  id: ID!
  startedAt: DateTime!
}

enum PuzzleType {
  HANJI
  HASHI
  MINESWEEPER
  SLITHERLINK
}

type Query {
  currentUser: QueryCurrentUserResult!
  dailyChallenges(after: String, before: String, first: Int, last: Int): QueryDailyChallengesConnection
  puzzle(input: QueryPuzzleInput!): QueryPuzzleResult!
  puzzles(input: QueryPuzzlesInput!): QueryPuzzlesResult!
}

union QueryCurrentUserResult = QueryCurrentUserSuccess | UnauthorizedError

type QueryCurrentUserSuccess {
  data: AuthenticatedUser!
}

type QueryDailyChallengesConnection {
  edges: [QueryDailyChallengesConnectionEdge]
  pageInfo: PageInfo!
}

type QueryDailyChallengesConnectionEdge {
  cursor: String!
  node: DailyChallenge
}

input QueryPuzzleInput {
  id: ID!
}

union QueryPuzzleResult = NotFoundError | QueryPuzzleSuccess | UnknownError

type QueryPuzzleSuccess {
  data: Puzzle!
}

input QueryPuzzlesInput {
  """
  The ID of the daily challenge to get puzzles for. If not provided, the latest daily challenge will be used.
  """
  dailyChallengeId: String
}

union QueryPuzzlesResult = NotFoundError | QueryPuzzlesSuccess | UnknownError

type QueryPuzzlesSuccess {
  data: [Puzzle!]!
}

type UnauthorizedError implements Error {
  message: String
}

type UnknownError implements Error {
  message: String
}

type ValidationError implements Error {
  message: String
}
