type AlreadyExistsError implements Error {
  message: String
}

type AuthPayload {
  token: String!
}

type AuthenticatedUser {
  dailyChallengeStreak: DailyChallengeStreak!
  id: ID!
}

type DailyChallenge {
  completedPuzzleCount: Int!
  date: DateTime!
  id: ID!
  puzzleCount: Int!
}

type DailyChallengeStreak {
  current: Int!
  max: Int!
}

scalar DateTime

interface Error {
  message: String
}

type FlowCell {
  col: Int!
  row: Int!
}

type FlowPair {
  ends: [FlowCell!]!
  number: Int!
}

type FlowPuzzle implements Puzzle {
  attempt: PuzzleAttempt
  dailyChallengeId: ID!
  description: String
  height: Int!
  id: ID!
  name: String!
  pairs: [FlowPair!]!
  width: Int!
}

type HanjiHint {
  col: Int!
  puzzleType: PuzzleType!
  row: Int!
  value: Int!
}

type HanjiPuzzle implements Puzzle {
  attempt: PuzzleAttempt
  colClues: [[Int!]!]!
  dailyChallengeId: ID!
  description: String
  height: Int!
  id: ID!
  name: String!
  rowClues: [[Int!]!]!
  width: Int!
}

input HashiBridgeInput {
  bridges: Int!
  from: HashiCoordinateInput!
  to: HashiCoordinateInput!
}

type HashiCoordinate {
  col: Int!
  row: Int!
}

input HashiCoordinateInput {
  col: Int!
  row: Int!
}

type HashiHint {
  bridges: Int!
  from: HashiCoordinate!
  puzzleType: PuzzleType!
  to: HashiCoordinate!
}

type HashiIsland {
  col: Int!
  requiredBridges: Int!
  row: Int!
}

type HashiPuzzle implements Puzzle {
  attempt: PuzzleAttempt
  dailyChallengeId: ID!
  description: String
  height: Int!
  id: ID!
  islands: [HashiIsland!]!
  name: String!
  width: Int!
}

enum MinesweeperCellValue {
  EIGHT
  FIVE
  FOUR
  MINE
  ONE
  SEVEN
  SIX
  THREE
  TWO
  ZERO
}

type MinesweeperHint {
  col: Int!
  isMine: Boolean!
  puzzleType: PuzzleType!
  row: Int!
}

type MinesweeperPuzzle implements Puzzle {
  attempt: PuzzleAttempt
  dailyChallengeId: ID!
  description: String
  height: Int!
  id: ID!
  mineCount: Int!
  mineField: [[MinesweeperCellValue!]!]!
  name: String!
  revealedCells: [MinesweeperRevealedCell!]!
  width: Int!
}

type MinesweeperRevealedCell {
  col: Int!
  row: Int!
  value: Int!
}

type Mutation {
  authenticateDevice(input: MutationAuthenticateDeviceInput!): AuthPayload!

  """
  Creates a daily challenge for the given date (admin only via x-admin-secret).
  """
  createDailyChallenge(input: MutationCreateDailyChallengeInput!): MutationCreateDailyChallengeResult!
  deleteProgress: MutationDeleteProgressResult!

  """
  Returns one guaranteed part of the puzzle solution as a hint. FLOW is not supported.
  """
  requestPuzzleHint(input: MutationRequestPuzzleHintInput!): MutationRequestPuzzleHintResult!

  """Solves a puzzle for the logged in user"""
  solvePuzzle(input: MutationSolvePuzzleInput!): MutationSolvePuzzleResult!
}

input MutationAuthenticateDeviceInput {
  deviceId: String!
}

input MutationCreateDailyChallengeInput {
  """The date for the daily challenge (start of day)."""
  date: DateTime!
}

union MutationCreateDailyChallengeResult = AlreadyExistsError | MutationCreateDailyChallengeSuccess | UnauthorizedError

type MutationCreateDailyChallengeSuccess {
  data: DailyChallenge!
}

union MutationDeleteProgressResult = MutationDeleteProgressSuccess | UnauthorizedError | UnknownError

type MutationDeleteProgressSuccess {
  data: Boolean!
}

input MutationRequestPuzzleHintInput {
  """
  Cells the user has already filled (0 or 1). Only provide when puzzle type is HANJI.
  """
  hanjiCurrentState: [[Int!]!]

  """
  Bridges the user has already placed. Only provide when puzzle type is HASHI.
  """
  hashiCurrentState: [HashiBridgeInput!]

  """
  Cells the user has already marked. Only provide when puzzle type is MINESWEEPER.
  """
  minesweeperCurrentState: [[Boolean!]!]
  puzzleId: ID!
  puzzleType: PuzzleType!

  """
  Edges the user has already set. Only provide when puzzle type is SLITHERLINK.
  """
  slitherlinkCurrentState: SlitherlinkSolutionInput

  """
  The unique key of the ad reward verification. Only provide when requesting a hint via an ad reward verification.
  """
  uniqueKey: String
}

union MutationRequestPuzzleHintResult = AlreadyExistsError | MutationRequestPuzzleHintSuccess | NotFoundError | UnauthorizedError | UnknownError | ValidationError

type MutationRequestPuzzleHintSuccess {
  data: PuzzleHint!
}

input MutationSolvePuzzleInput {
  """
  The time the user completed the puzzle, if they completed it successfully
  """
  completedAt: DateTime

  """
  The duration of the puzzle in milliseconds, if they completed it successfully
  """
  durationMs: Int

  """
  The solution to the Flow puzzle. Should only be provided if the puzzle type is FLOW.
  """
  flowSolution: [[Int!]!]

  """
  The solution to the Hanji puzzle. Should only be provided if the puzzle type is HANJI.
  """
  hanjiSolution: [[Int!]!]

  """
  The solution to the Hashi puzzle. Should only be provided if the puzzle type is HASHI.
  """
  hashiSolution: [HashiBridgeInput!]

  """
  The solution to the Minesweeper puzzle. Should only be provided if the puzzle type is MINESWEEPER.
  """
  minesweeperSolution: [[Boolean!]!]
  puzzleId: ID!
  puzzleType: PuzzleType!

  """
  The solution to the Slitherlink puzzle. Should only be provided if the puzzle type is SLITHERLINK.
  """
  slitherlinkSolution: SlitherlinkSolutionInput

  """The time the user started the puzzle"""
  startedAt: DateTime!
}

union MutationSolvePuzzleResult = AlreadyExistsError | MutationSolvePuzzleSuccess | NotFoundError | UnauthorizedError | UnknownError | ValidationError

type MutationSolvePuzzleSuccess {
  data: PuzzleAttempt!
}

type NotFoundError implements Error {
  message: String
}

type PageInfo {
  endCursor: String
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
}

interface Puzzle {
  attempt: PuzzleAttempt
  dailyChallengeId: ID!
  description: String
  id: ID!
  name: String!
}

type PuzzleAttempt {
  completedAt: DateTime
  durationMs: Int
  hintsUsed: Int!
  id: ID!

  """
  The percentage of users who completed the puzzle slower than the attempt.
  """
  percentage: Float!
  startedAt: DateTime!
}

union PuzzleHint = HanjiHint | HashiHint | MinesweeperHint | SlitherlinkHint

enum PuzzleType {
  FLOW
  HANJI
  HASHI
  MINESWEEPER
  SLITHERLINK
}

type Query {
  currentUser: QueryCurrentUserResult!
  dailyChallenges(after: String, before: String, first: Int, last: Int): QueryDailyChallengesConnection
  puzzle(input: QueryPuzzleInput!): QueryPuzzleResult!
  puzzles(input: QueryPuzzlesInput!): QueryPuzzlesResult!
}

union QueryCurrentUserResult = QueryCurrentUserSuccess | UnauthorizedError

type QueryCurrentUserSuccess {
  data: AuthenticatedUser!
}

type QueryDailyChallengesConnection {
  edges: [QueryDailyChallengesConnectionEdge]
  pageInfo: PageInfo!
}

type QueryDailyChallengesConnectionEdge {
  cursor: String!
  node: DailyChallenge
}

input QueryPuzzleInput {
  id: ID!
}

union QueryPuzzleResult = NotFoundError | QueryPuzzleSuccess | UnknownError

type QueryPuzzleSuccess {
  data: Puzzle!
}

input QueryPuzzlesInput {
  """
  The ID of the daily challenge to get puzzles for. If not provided, the latest daily challenge will be used.
  """
  dailyChallengeId: String
}

union QueryPuzzlesResult = NotFoundError | QueryPuzzlesSuccess | UnknownError

type QueryPuzzlesSuccess {
  data: [Puzzle!]!
}

input RequestPuzzleHintInput {
  """
  Cells the user has already filled (0 or 1). Only provide when puzzle type is HANJI. Used to avoid returning a hint for a cell the user already set.
  """
  hanjiCurrentState: [[Int!]!]

  """
  Bridges the user has already placed. Only provide when puzzle type is HASHI. Used to avoid returning a hint for a bridge the user already set.
  """
  hashiCurrentState: [HashiBridgeInput!]

  """
  Cells the user has already marked (mine or not). Only provide when puzzle type is MINESWEEPER. Used to avoid returning a hint for a cell the user already set.
  """
  minesweeperCurrentState: [[Boolean!]!]
  puzzleId: ID!

  """The type of puzzle. FLOW is not supported for hints."""
  puzzleType: PuzzleType!

  """
  Edges the user has already set. Only provide when puzzle type is SLITHERLINK. Used to avoid returning a hint for an edge the user already set.
  """
  slitherlinkCurrentState: SlitherlinkSolutionInput
}

enum SlitherlinkEdgeType {
  HORIZONTAL
  VERTICAL
}

type SlitherlinkHint {
  col: Int!
  edgeType: SlitherlinkEdgeType!
  filled: Boolean!
  puzzleType: PuzzleType!
  row: Int!
}

type SlitherlinkPuzzle implements Puzzle {
  attempt: PuzzleAttempt
  clues: [[Int]!]!
  dailyChallengeId: ID!
  description: String
  height: Int!
  id: ID!
  name: String!
  width: Int!
}

input SlitherlinkSolutionInput {
  horizontalEdges: [[Boolean!]!]!
  verticalEdges: [[Boolean!]!]!
}

type UnauthorizedError implements Error {
  message: String
}

type UnknownError implements Error {
  message: String
}

type ValidationError implements Error {
  message: String
}
