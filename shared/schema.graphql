type AuthPayload {
  token: String!
}

interface Error {
  message: String
}

type HealthStatus {
  status: String!
  timestamp: String!
}

type Mutation {
  authenticateDevice(input: MutationAuthenticateDeviceInput!): AuthPayload!
}

input MutationAuthenticateDeviceInput {
  deviceId: String!
}

type NotFoundError implements Error {
  message: String
}

type Query {
  health: HealthStatus!
  user(input: QueryUserInput!): QueryUserResult!
}

input QueryUserInput {
  id: String!
}

union QueryUserResult = NotFoundError | QueryUserSuccess

type QueryUserSuccess {
  data: User!
}

type UnauthorizedError implements Error {
  message: String
}

type UnknownError implements Error {
  message: String
}

type User {
  id: ID
}

type ValidationError implements Error {
  message: String
}
