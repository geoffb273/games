type HealthStatus {
  status: String!
  timestamp: String!
}

type NotFoundError {
  message: String
}

type Query {
  health: HealthStatus!
  user(input: QueryUserInput!): QueryUserResult!
}

input QueryUserInput {
  id: String!
}

union QueryUserResult = NotFoundError | QueryUserSuccess

type QueryUserSuccess {
  data: User!
}

type UnauthorizedError {
  message: String
}

type UnknownError {
  message: String
}

type User {
  id: ID
}

type ValidationError {
  message: String
}
