# Cloudflare Worker for Game Brain API proxy
# Deploy: npx wrangler deploy
# Set secret: npx wrangler secret put EC2_ORIGIN_URL
#   Value = Pulumi export ec2OriginUrl (e.g. http://<elastic-ip>:4000)

name = "game-brain-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Route and custom domain are configured in Cloudflare dashboard or via:
routes = [{ pattern = "api.game-brain.net/*", zone_name = "game-brain.net" }]


[vars]
# Optional: add non-secret config here

# EC2_ORIGIN_URL must be set as a secret (not in this file):
# wrangler secret put EC2_ORIGIN_URL
